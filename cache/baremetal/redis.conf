# ============================================================
# Mini Commerce — Cache Tier Redis 7 config (bare metal)
# Install to /etc/redis/redis.conf (Ubuntu) or /etc/redis.conf (RHEL/AL).
# Mirrors the original docker-compose redis command options:
#   --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
# ============================================================

# --- Persistence ---
# AOF on: the cart store survives restarts. RDB snapshots stay at defaults.
appendonly yes
appendfsync everysec
dir /var/lib/redis

# --- Memory ---
# Cache-style eviction: drop least-recently-used keys when full.
maxmemory 128mb
maxmemory-policy allkeys-lru

# --- Network ---
# The WAS tier connects from a SEPARATE host on the private network, so Redis
# must listen on the private interface (not just loopback). Two options:
#
#   1) Bind to the host's PRIVATE IP and keep protected-mode on (recommended):
#        bind 127.0.0.1 <THIS_HOST_PRIVATE_IP>
#        protected-mode yes
#   2) Listen on all interfaces (only if a security group/firewall restricts
#      6379 to the WAS SG):
#        bind 0.0.0.0
#        protected-mode no
#
# Default below = option 2, assuming a locked-down private-subnet SG. Harden as
# needed. ALWAYS restrict 6379 to the WAS tier; never expose it to the internet.
bind 0.0.0.0
protected-mode no
port 6379

# Optionally require a password (then use redis://:<pw>@<host>:6379/0 in WAS):
# requirepass <strong-password>

# --- Misc ---
tcp-keepalive 300
timeout 0
