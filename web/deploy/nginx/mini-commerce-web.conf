# ============================================================
# Mini Commerce — Web Tier (nginx) server block
# Serves the React SPA and reverse-proxies /api/ to the WAS tier.
#
# __WAS_UPSTREAM__ is a placeholder substituted by deploy/deploy.sh
# (envsubst) with the WAS private address, e.g. 10.0.2.10:8000.
#
# Install path (bare metal): /etc/nginx/conf.d/mini-commerce-web.conf
# ============================================================
server {
    listen 80;
    server_name _;

    root /var/www/mini-commerce;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy API calls to the WAS (FastAPI/Gunicorn) tier.
    # The browser only ever talks to this web tier → no CORS needed,
    # and the SPA uses relative /api/v1 paths (VITE_API_BASE_URL="").
    location /api/ {
        proxy_pass http://__WAS_UPSTREAM__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
